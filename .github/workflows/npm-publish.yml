name: npm publish

on:
  workflow_call:

permissions:
  contents: read

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          # node 24 provides npm >= 11.5.1, required for OIDC trusted publishing.
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - run: npm publish --provenance
