name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check:
    uses: ./.github/workflows/checks.yml

  publish:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh release create
      id-token: write # npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          # node 24 provides npm >= 11.5.1, required for OIDC trusted publishing.
          node-version: "24"
          registry-url: https://registry.npmjs.org

      # npm (not bun): bun publish can't do npm OIDC trusted publishing.
      - run: npm publish --provenance

      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(jq -r .version package.json)"
          gh release create "v$VERSION" --target "$GITHUB_SHA" --title "v$VERSION" --generate-notes
