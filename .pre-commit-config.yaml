repos:
  - repo: local
    hooks:
      - id: sync-version
        name: sync-version
        entry: bun scripts/sync-version.ts
        language: system
        pass_filenames: false
        files: ^(package\.json|plugin/\.claude-plugin/plugin\.json)$
      - id: sync-cli-docs
        name: sync-cli-docs
        entry: bun scripts/sync-cli-docs.ts
        language: system
        pass_filenames: false
        files: ^(src/cli/cli\.ts|plugin/skills/lotra/SKILL\.md|README\.md)$
      - id: format
        name: format
        entry: bun x prettier --write --ignore-unknown
        language: system
        types_or: [ts, tsx, javascript, jsx, json, yaml, markdown, css, html]
      - id: typecheck
        name: typecheck
        entry: bun x tsc --noEmit
        language: system
        pass_filenames: false
        types_or: [ts, tsx]
      - id: test
        name: test
        entry: bun test
        language: system
        pass_filenames: false
        types_or: [ts, tsx]
